<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WPS Name Picker</title>
    
    <!-- PWA / iOS Home Screen Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WPS Picker">
    
    <!-- Custom SVG Icon (Home Screen & Favicon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 font-size=%2270%22 x=%2250%%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>W</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 font-size=%2270%22 x=%2250%%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>W</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
        }
        #wheel-container {
            position: relative;
            width: 85vw;
            max-width: 380px;
            aspect-ratio: 1;
            margin: 15px auto;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        #pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ef4444;
            z-index: 20;
        }
        @supports (padding: env(safe-area-inset-top)) {
            .app-container {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="app-container p-4 max-w-lg mx-auto w-full flex-grow">
        <header class="text-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800">WPS Class Picker</h1>
            <p class="text-gray-500 text-xs uppercase tracking-widest font-semibold">Staff Tool 25-26</p>
        </header>

        <!-- Config Panel -->
        <div class="bg-white rounded-2xl p-4 shadow-sm mb-4 space-y-3">
            <div id="controlsSection" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Select Teacher</label>
                    <select id="teacherSelect" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none appearance-none font-medium">
                        <option value="">Loading students...</option>
                    </select>
                </div>

                <div class="flex items-center justify-between">
                    <span class="text-gray-700 text-sm font-medium">Remove student after spin</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="removeToggle" class="sr-only peer">
                        <div class="w-10 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Wheel Visual -->
        <div id="wheel-container">
            <div id="pointer"></div>
            <canvas id="wheel"></canvas>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-full shadow-lg z-10 flex items-center justify-center border-4 border-gray-50">
                <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
            </div>
        </div>

        <!-- Result Display -->
        <div class="text-center h-16 mt-2 flex items-center justify-center">
            <h2 id="winnerName" class="text-2xl font-black text-blue-700 uppercase tracking-tight"></h2>
        </div>

        <!-- Main Actions -->
        <div class="grid grid-cols-2 gap-3 mt-2">
            <button id="spinBtn" disabled class="bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition disabled:bg-gray-300 disabled:shadow-none">
                SPIN
            </button>
            <button id="resetBtn" class="bg-gray-200 text-gray-700 font-bold py-4 rounded-2xl active:scale-95 transition">
                RESET
            </button>
        </div>
        
        <div class="mt-4 text-center">
            <p id="countDisplay" class="text-gray-400 text-xs font-medium"></p>
        </div>
    </div>

    <script>
        // Updated with your active Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGKZknj0KuxrF8tDJ3WhvZKpxDH57IMvmw-KpbS7btlovLSXKEUxSM0EtX8eNm134nRg/exec';

        let allStudents = [];
        let currentClassList = [];
        let rotation = 0;
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const colors = ['#2563eb', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777', '#0891b2', '#4b5563'];

        async function loadData() {
            try {
                document.getElementById('teacherSelect').innerHTML = '<option value="">Loading students...</option>';
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('teacherSelect').innerHTML = `<option value="">${data.error}</option>`;
                    return;
                }

                allStudents = data.students;
                populateTeachers(data.teachers);
            } catch (err) {
                console.error(err);
                document.getElementById('teacherSelect').innerHTML = '<option value="">Connection Error</option>';
            }
        }

        function populateTeachers(teachers) {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = '<option value="">Choose a Class...</option>';
            teachers.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                select.appendChild(opt);
            });
        }

        function updateWheel() {
            const size = 800;
            canvas.width = size;
            canvas.height = size;
            
            if (currentClassList.length === 0) {
                ctx.fillStyle = "#f3f4f6";
                ctx.beginPath();
                ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                ctx.fill();
                document.getElementById('spinBtn').disabled = true;
                return;
            }

            document.getElementById('spinBtn').disabled = false;
            const arcSize = (Math.PI * 2) / currentClassList.length;

            currentClassList.forEach((student, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(size/2, size/2);
                ctx.arc(size/2, size/2, size/2, i * arcSize, (i + 1) * arcSize);
                ctx.fill();

                ctx.save();
                ctx.translate(size/2, size/2);
                ctx.rotate(i * arcSize + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 26px sans-serif";
                
                let displayName = student.Name || "Student";
                ctx.fillText(displayName, size/2 - 40, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (currentClassList.length === 0) return;
            
            const spinBtn = document.getElementById('spinBtn');
            const winnerDisplay = document.getElementById('winnerName');
            spinBtn.disabled = true;
            winnerDisplay.textContent = "PICKING...";

            const extraSpins = 7 + Math.random() * 5;
            rotation += extraSpins * 360;
            
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const actualRotation = rotation % 360;
                const segmentAngle = 360 / currentClassList.length;
                const adjustedRotation = (360 - (actualRotation % 360) + 270) % 360;
                const winnerIndex = Math.floor(adjustedRotation / segmentAngle);
                const winner = currentClassList[winnerIndex];

                winnerDisplay.textContent = winner.Name;
                
                if (document.getElementById('removeToggle').checked) {
                    currentClassList.splice(winnerIndex, 1);
                    setTimeout(() => {
                        updateWheel();
                        updateCount();
                    }, 1200);
                }
                
                spinBtn.disabled = false;
            }, 4000);
        }

        function updateCount() {
            document.getElementById('countDisplay').textContent = `${currentClassList.length} STUDENTS LEFT`;
        }

        document.getElementById('teacherSelect').addEventListener('change', (e) => {
            const teacher = e.target.value;
            currentClassList = allStudents.filter(s => s.Teacher === teacher);
            rotation = 0;
            canvas.style.transform = `rotate(0deg)`;
            document.getElementById('winnerName').textContent = "";
            updateWheel();
            updateCount();
        });

        document.getElementById('spinBtn').addEventListener('click', spin);
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            const teacher = document.getElementById('teacherSelect').value;
            if (teacher) {
                currentClassList = allStudents.filter(s => s.Teacher === teacher);
                rotation = 0;
                canvas.style.transform = `rotate(0deg)`;
                document.getElementById('winnerName').textContent = "";
                updateWheel();
                updateCount();
            }
        });

        loadData();
        updateWheel();
    </script>
</body>
</html>
