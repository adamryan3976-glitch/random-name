<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WPS Wheel of Students</title>
    
    <!-- PWA / iOS Home Screen Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WPS Picker">
    
    <!-- GitHub Image Assets -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/adamryan3976-glitch/random-name/main/Knight%20Wheel.png?v=3">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/adamryan3976-glitch/random-name/main/Knight%20Wheel.png?v=3">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --knight-navy: #1a2a44;
            --knight-gold: #c5a059;
            --knight-crimson: #8b0000;
            --knight-silver: #e5e7eb;
        }

        body {
            background-color: var(--knight-navy);
            background-image: radial-gradient(circle at center, #2c3e50 0%, #1a2a44 100%);
            font-family: 'Georgia', serif;
            touch-action: manipulation;
            color: white;
            overflow-x: hidden;
        }

        .knight-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 1.5rem;
        }

        #wheel-container {
            position: relative;
            width: 85vw;
            max-width: 380px;
            aspect-ratio: 1;
            margin: 20px auto;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--knight-gold);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid var(--knight-gold);
            z-index: 40;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        #shield-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.6);
            z-index: 20;
            border: 4px solid var(--knight-gold);
            overflow: hidden;
        }

        #shield-hub img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gold-button {
            background: linear-gradient(135deg, #d4af37 0%, #c5a059 100%);
            color: var(--knight-navy);
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            box-shadow: 0 4px 0 #8e7035;
            transition: all 0.1s;
        }

        .gold-button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8e7035;
        }

        .gold-button:disabled {
            background: #4b5563;
            box-shadow: none;
            color: #9ca3af;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23c5a059' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            appearance: none;
        }

        @keyframes winner-pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .animate-winner {
            animation: winner-pulse 0.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="app-container p-4 max-w-lg mx-auto w-full flex-grow">
        <header class="text-center mb-6 flex flex-col items-center">
            <div class="relative">
                <div class="absolute inset-0 bg-gold-500 blur-lg opacity-20 rounded-full"></div>
                <img src="https://raw.githubusercontent.com/adamryan3976-glitch/random-name/main/Knight%20Wheel.png?v=3" 
                     alt="WPS Knights Logo" 
                     class="w-28 h-28 rounded-3xl shadow-2xl mb-3 object-cover border-4 border-gold-500/50 relative z-10"
                     onerror="this.src='https://raw.githubusercontent.com/adamryan3976-glitch/random-name/main/Shield%20-%20No%20Text.png?v=3'">
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase italic" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">WPS Wheel of Students</h1>
            <div class="h-1 w-24 bg-gradient-to-r from-transparent via-[#c5a059] to-transparent mt-1"></div>
            <p class="text-[#c5a059] text-[10px] uppercase tracking-[0.3em] font-bold mt-2">Knight Order • Staff Tool 25-26</p>
        </header>

        <!-- Config Panel -->
        <div class="knight-card p-5 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-[#c5a059] uppercase tracking-widest mb-2">Assigning Officer (Teacher)</label>
                    <select id="teacherSelect" class="w-full p-3 bg-black/30 border border-[#c5a059]/30 rounded-xl outline-none font-bold text-white">
                        <option value="">Summoning classes...</option>
                    </select>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <span class="text-gray-300 text-sm font-medium">Banish chosen from wheel</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="removeToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#c5a059]"></div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Wheel Visual -->
        <div id="wheel-container">
            <div id="pointer"></div>
            <canvas id="wheel"></canvas>
            <div id="shield-hub">
                <img src="https://raw.githubusercontent.com/adamryan3976-glitch/random-name/main/Shield%20-%20No%20Text.png?v=3" 
                     alt="WPS Shield">
            </div>
        </div>

        <!-- Result Display -->
        <div class="text-center h-20 mt-4 flex items-center justify-center">
            <h2 id="winnerName" class="text-4xl font-black text-white uppercase italic tracking-tighter" style="text-shadow: 0 0 15px rgba(197, 160, 89, 0.8)"></h2>
        </div>

        <!-- Main Actions -->
        <div class="grid grid-cols-2 gap-4 mt-2 pb-8">
            <button id="spinBtn" disabled class="gold-button text-lg font-black py-5 rounded-2xl tracking-widest">
                SPIN WHEEL
            </button>
            <button id="resetBtn" class="bg-white/10 text-[#c5a059] border border-[#c5a059]/30 font-bold py-5 rounded-2xl active:bg-white/20 transition">
                RESET LIST
            </button>
        </div>
        
        <div class="text-center opacity-60">
            <p id="countDisplay" class="text-[#c5a059] text-[10px] font-bold tracking-[0.2em]"></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGKZknj0KuxrF8tDJ3WhvZKpxDH57IMvmw-KpbS7btlovLSXKEUxSM0EtX8eNm134nRg/exec';

        // --- Audio Logic ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClickSound(velocity = 1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150 + (velocity * 100), audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWinSound() {
            const notes = [261.63, 329.63, 392.00, 523.25]; // C major
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
            });
        }

        // --- Game Logic ---
        let allStudents = [];
        let currentClassList = [];
        let rotation = 0;
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        
        const colors = [
            '#1a2a44', '#8b0000', '#c5a059', '#2d3436', 
            '#4a1c1c', '#0f172a', '#b45309', '#7f1d1d'
        ];

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                if (data.error) return;
                allStudents = data.students;
                populateTeachers(data.teachers);
            } catch (err) {
                console.error(err);
            }
        }

        function populateTeachers(teachers) {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = '<option value="">Select a Class...</option>';
            teachers.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                select.appendChild(opt);
            });
        }

        function updateWheel() {
            const size = 1000;
            canvas.width = size;
            canvas.height = size;
            
            if (currentClassList.length === 0) {
                ctx.fillStyle = "rgba(255,255,255,0.05)";
                ctx.beginPath();
                ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                ctx.fill();
                document.getElementById('spinBtn').disabled = true;
                return;
            }

            document.getElementById('spinBtn').disabled = false;
            const arcSize = (Math.PI * 2) / currentClassList.length;

            currentClassList.forEach((student, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(size/2, size/2);
                ctx.arc(size/2, size/2, size/2, i * arcSize, (i + 1) * arcSize);
                ctx.fill();
                
                ctx.strokeStyle = "rgba(197, 160, 89, 0.4)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(size/2, size/2);
                ctx.rotate(i * arcSize + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 4;
                
                ctx.font = "bold 32px Georgia, serif";
                let displayName = student.Name || "Student";
                ctx.fillText(displayName, size/2 - 60, 12);
                ctx.restore();
            });
        }

        function triggerCelebration() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
              const timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              const particleCount = 50 * (timeLeft / duration);
              // Confetti
              confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
              confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);

            // Fireworks burst
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#c5a059', '#ffffff', '#8b0000']
            });
        }

        function spin() {
            if (currentClassList.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const spinBtn = document.getElementById('spinBtn');
            const winnerDisplay = document.getElementById('winnerName');
            spinBtn.disabled = true;
            winnerDisplay.textContent = "CONSULTING FATE...";
            winnerDisplay.classList.remove('animate-winner');
            winnerDisplay.style.opacity = "0.5";

            const spinDuration = 4000;
            const extraSpins = 8 + Math.random() * 5;
            const totalRotation = extraSpins * 360;
            const startRotation = rotation;
            rotation += totalRotation;
            
            canvas.style.transform = `rotate(${rotation}deg)`;

            // --- Tick sound simulation ---
            const segmentAngle = 360 / currentClassList.length;
            let lastTickAngle = startRotation % 360;
            const startTime = performance.now();

            function checkTick(time) {
                const elapsed = time - startTime;
                if (elapsed >= spinDuration) return;

                // Cubic-bezier approximation for the click timing
                const progress = elapsed / spinDuration;
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentAngle = (startRotation + (totalRotation * easeOut)) % 360;
                
                const diff = Math.abs(currentAngle - lastTickAngle);
                if (diff >= segmentAngle) {
                    playClickSound(1 - progress); // Click gets quieter as it slows
                    lastTickAngle = currentAngle;
                }
                requestAnimationFrame(checkTick);
            }
            requestAnimationFrame(checkTick);

            setTimeout(() => {
                const actualRotation = rotation % 360;
                const adjustedRotation = (360 - (actualRotation % 360) + 270) % 360;
                const winnerIndex = Math.floor(adjustedRotation / segmentAngle);
                const winner = currentClassList[winnerIndex];

                winnerDisplay.textContent = winner.Name;
                winnerDisplay.style.opacity = "1";
                winnerDisplay.classList.add('animate-winner');
                
                playWinSound();
                triggerCelebration();
                
                if (document.getElementById('removeToggle').checked) {
                    currentClassList.splice(winnerIndex, 1);
                    setTimeout(() => {
                        updateWheel();
                        updateCount();
                    }, 2000);
                }
                
                spinBtn.disabled = false;
            }, spinDuration);
        }

        function updateCount() {
            document.getElementById('countDisplay').textContent = `${currentClassList.length} KNIGHTS REMAINING`;
        }

        document.getElementById('teacherSelect').addEventListener('change', (e) => {
            const teacher = e.target.value;
            currentClassList = allStudents.filter(s => s.Teacher === teacher);
            rotation = 0;
            canvas.style.transform = `rotate(0deg)`;
            document.getElementById('winnerName').textContent = "";
            document.getElementById('winnerName').classList.remove('animate-winner');
            updateWheel();
            updateCount();
        });

        document.getElementById('spinBtn').addEventListener('click', spin);
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            const teacher = document.getElementById('teacherSelect').value;
            if (teacher) {
                currentClassList = allStudents.filter(s => s.Teacher === teacher);
                rotation = 0;
                canvas.style.transform = `rotate(0deg)`;
                document.getElementById('winnerName').textContent = "";
                document.getElementById('winnerName').classList.remove('animate-winner');
                updateWheel();
                updateCount();
            }
        });

        loadData();
    </script>
</body>
</html>
